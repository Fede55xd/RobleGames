<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TANKS BATTLE - Menú Principal</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: row;
      text-align: center;
      background-color: #2c3e50;
      color: white;
      font-family: 'Arial', sans-serif;
    }

    /* Estilo para la sección de instrucciones */
    .instrucciones {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-left: 50px;
    }

    .instrucciones h2 {
      font-size: 32px;
      font-weight: bold;
      color: #FFD700;
      margin-bottom: 20px;
      text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.5);
    }

    .instrucciones p {
      font-size: 20px;
      margin: 10px 0;
      color: #f1f1f1;
    }

    .instrucciones .botones {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .instrucciones .boton {
      width: 50px;
      height: 50px;
      margin: 10px;
      background-color: #4CAF50;
      color: white;
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Estilo para el área principal */
    .area-principal {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.5);
      margin-bottom: 40px;
    }

    button {
      padding: 15px 30px;
      margin: 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    #volver {
      background-color: #f44336;
    }

    #volver:hover {
      background-color: #da190b;
    }

    .decoracion {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('assets/fondo1.jpg'); /* Cambia esto al fondo que quieras usar */
      background-size: cover;
      background-position: center center;
      opacity: 0.3;
      z-index: -1;
    }
  </style>
</head>
<body>

  <div class="decoracion"></div>

  <!-- Área de instrucciones -->
  <div class="instrucciones">
    <h2>Instrucciones</h2>
    <p>Jugador 1 usa las <strong>flechas del teclado</strong> para mover y <strong>Control derecho</strong> para disparar.</p>
    <p>Jugador 2 usa <strong>WASD</strong> para mover y <strong>Control izquierdo</strong> para disparar.</p>

    <!-- Controles en botones -->
    <div class="botones">
      <!-- Botones para las flechas del Jugador 1 -->
      <div class="boton">&#8593;</div>
      <div class="boton">&#8592;</div>
      <div class="boton">&#8595;</div>
      <div class="boton">&#8594;</div>
    </div>
    <p>Jugador 1 - Movimiento</p>

    <div class="botones">
      <!-- Botón de Control izquierdo -->
      <div class="boton">Ctrl</div>
    </div>
    <p>Jugador 1 - Disparar</p>

    <div class="botones">
      <!-- Botones para WASD del Jugador 2 -->
      <div class="boton">W</div>
      <div class="boton">A</div>
      <div class="boton">S</div>
      <div class="boton">D</div>
    </div>
    <p>Jugador 2 - Movimiento</p>

    <div class="botones">
      <!-- Botón de Control derecho -->
      <div class="boton">Ctrl</div>
    </div>
    <p>Jugador 2 - Disparar</p>
  </div>

  <!-- Área principal -->
  <div class="area-principal">
    <h1>TANKS BATTLE</h1>
    
    <!-- Botones de acción -->
    <button onclick="jugar()">Jugar</button>
    <button id="volver" onclick="window.location.href='../index.html'">Volver al Menú Principal</button>
  </div>

  <script>
    // Función para iniciar el juego, redirige a la página del juego
    function jugar() {
      window.location.href = 'jugar.html'; // Cambia a la URL donde está tu juego
    }
  </script>

</body>
</html>
