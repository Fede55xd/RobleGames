<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TANKS BATTLE</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      background-color: #1a1a1a;
      color: white;
      font-family: 'Arial', sans-serif;
    }

    h1 {
      font-size: 48px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.5);
    }

    p {
      font-size: 24px;
      margin-top: 20px;
      color: #f1f1f1;
    }

    .mensaje {
      font-size: 28px;
      font-weight: bold;
      color: #FF6347;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
    }

    button {
      padding: 15px 30px;
      margin: 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    #reiniciar {
      background-color: #f44336;
    }

    #reiniciar:hover {
      background-color: #da190b;
    }

    .decoracion {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 100%;
      height: 100%;
      background-image: url('assets/fondo1.jpg'); /* Cambia esto al fondo que quieras usar */
      background-size: cover;
      background-position: center center;
      opacity: 0.4;
      z-index: -1;
    }
  </style>
</head>
<body>

  <div class="decoracion"></div>
  <h1>TANKS BATTLE</h1>
  
  <!-- Mensaje que se actualizará con el ganador -->
  <p class="mensaje" id="mensajeGanador">¡Jugador 1 ha ganado!</p>

  <button onclick="window.location.href='../index.html'">Volver al Menú Principal</button>
  <button id="reiniciar" onclick="reiniciarJuego()">Reiniciar Juego</button>

  <script>
    // Obtener el ganador desde el localStorage (o de cualquier otra fuente que utilices)
    const ganador = localStorage.getItem("ganador"); // Asumimos que el ganador se guarda en localStorage
    
    // Actualizar el mensaje dependiendo del jugador que ganó
    const mensajeGanador = document.getElementById("mensajeGanador");
    if (ganador === "1") {
      mensajeGanador.innerText = "¡Jugador 1 ha ganado!";
    } else if (ganador === "2") {
      mensajeGanador.innerText = "¡Jugador 2 ha ganado!";
    } else {
      mensajeGanador.innerText = "¡Hubo un error al determinar al ganador!";
    }

    // Función para reiniciar el juego
    function reiniciarJuego() {
      location.reload(); // Recarga la página para reiniciar el juego
    }
  </script>

</body>
</html>
