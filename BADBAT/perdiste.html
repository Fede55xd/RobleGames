<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdiste</title>
    <style>
        body {
            background-image: url('assets/fondo.png');
            background-size: cover;
            background-position: center center;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h2 {
            font-size: 70px;
            font-weight: bold;
            text-shadow: 5px 5px 5px rgba(0, 0, 0, 6);
            margin-bottom: 40px;
            color: skyblue;
        }

        h1 {
            font-size: 70px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.7);
            margin-bottom: 40px;
            color: red;
        }

        #play-btn, #menu-btn {
            padding: 20px 50px;
            font-size: 32px;
            font-weight: bold;
            background-color: rgb(104, 197, 0);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
            margin: 10px;
        }

        #play-btn:hover, #menu-btn:hover {
            background-color: rgb(104, 197, 0);
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.8);
        }

        #play-btn:active, #menu-btn:active {
            transform: scale(1.05);
        }

        /* Animación para el fondo */
        @keyframes backgroundAnimation {
            0% {
                background-position: center;
            }
            50% {
                background-position: top right;
            }
            100% {
                background-position: center;
            }
        }

        body {
            animation: backgroundAnimation 10s infinite alternate;
        }
    </style>
</head>
<body>

    <h1>BADBAT</h1>
    <h2>PERDISTE</h2>

    <!-- Botones para reiniciar o ir al menú principal -->
    <button id="play-btn">REINICIAR</button>
    <button id="menu-btn">MENÚ PRINCIPAL</button>

    <script>
        // Acción cuando se haga clic en el botón "REINICIAR"
        document.getElementById('play-btn').addEventListener('click', function() {
            // Redirigir al jugador al juego (jugar.html)
            window.location.href = 'jugar.html';
        });

        // Acción cuando se haga clic en el botón "MENÚ PRINCIPAL"
        document.getElementById('menu-btn').addEventListener('click', function() {
            // Redirigir al jugador al menú principal (../index.html)
            window.location.href = '../index.html';
        });
    </script>

</body>
</html>
