<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡HAS PERDIDO!</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(45deg, #065c05, #191775, #a67117, #732415); /* Gradiente dinámico */
      background-size: 400% 400%; /* Tamaño más grande para el gradiente */
      animation: gradientAnimation 10s ease infinite; /* Animación suave del gradiente */
      font-family: 'Press Start 2P', cursive;
    }

    @keyframes gradientAnimation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .title {
      font-size: 28px; /* Título más grande */
      color: white;
      margin-bottom: 30px;
      text-align: center;
      z-index: 2;
    }

    .victories-container {
      font-size: 96px; /* Hacemos el contador de estrellas 4 veces más grande */
      color: white;
      margin-bottom: 40px;
      z-index: 2;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .start-button {
      position: relative;
      padding: 30px 60px;
      font-size: 18px;
      background-color: #ff007f;
      color: white;
      border: 3px solid #ffb300;
      border-radius: 10px;
      font-family: 'Press Start 2P', cursive;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.6), 0 0 25px rgba(255, 179, 0, 0.8);
      z-index: 3;
      text-align: center;
      cursor: pointer;
      user-select: none;
      outline: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      transform: none;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      margin-bottom: 20px; /* Espacio entre los botones */
    }

    .start-button:hover {
      background-color: rgb(100, 100, 240);
      box-shadow: 0 0 25px rgba(100, 100, 240, 1), 0 0 40px rgba(80, 80, 200, 1);
    }

    .start-button:active {
      transform: none;
    }

    .welcome-text {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .start-text {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
    }

    .salir-button {
      padding: 20px 50px;
      font-size: 16px;
      background-color: #2d8cf0;
      color: white;
      border: 3px solid #ffb300;
      border-radius: 10px;
      font-family: 'Press Start 2P', cursive;
      box-shadow: 0 0 15px rgba(45, 140, 240, 0.6), 0 0 25px rgba(255, 179, 0, 0.8);
      cursor: pointer;
      user-select: none;
      outline: none;
      text-align: center;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      margin-bottom: 20px;
    }

    .salir-button:hover {
      background-color: rgb(80, 100, 240);
      box-shadow: 0 0 25px rgba(80, 100, 240, 1), 0 0 40px rgba(70, 90, 200, 1);
    }

    .salir-button:active {
      transform: none;
    }

    .salir-text {
      font-size: 16px;
    }

    .reset-button {
      padding: 20px 50px;
      font-size: 16px;
      background-color: #ff6b6b;
      color: white;
      border: 3px solid #ffb300;
      border-radius: 10px;
      font-family: 'Press Start 2P', cursive;
      box-shadow: 0 0 15px rgba(255, 107, 107, 0.6), 0 0 25px rgba(255, 179, 0, 0.8);
      cursor: pointer;
      user-select: none;
      outline: none;
      text-align: center;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }

    .reset-button:hover {
      background-color: rgb(240, 100, 100);
      box-shadow: 0 0 25px rgba(240, 100, 100, 1), 0 0 40px rgba(200, 80, 80, 1);
    }

    .reset-button:active {
      transform: none;
    }

    .confirm-reset {
      display: none;
      font-size: 18px;
      color: white;
      margin-top: 20px;
      text-align: center;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Título de bienvenida -->
  <div class="title">¡THE CIRCLE OF COLORS!</div>

  <!-- Contenedor de estrellas (si tienes un sistema de estrellas, esto mostrará las que tengas) -->
  <div class="victories-container">
    <span class="victory-count" id="victoryCount">0</span> <span>Estrellas</span>
  </div>

  <!-- Contenedor de botones -->
  <div class="buttons-container">
    <!-- Botón para jugar -->
    <button class="start-button" onclick="window.location.href='jugar.html'">
      <div class="welcome-text">¡HAS PERDIDO!</div>
      <div class="start-text">CLICK PARA JUGAR DE NUEVO</div>
    </button>

    <!-- Botón de salir al menú principal -->
    <button class="salir-button" onclick="window.location.href='../index.html'">
      <div class="salir-text">Volver al Menú Principal</div>
    </button>

    <!-- Botón para reiniciar datos -->
    <button class="reset-button" id="resetButton" onclick="resetData()">
      Reiniciar Datos
    </button>

    <!-- Confirmación de reinicio -->
    <div id="confirmReset" class="confirm-reset">
      ¿Estás seguro? Esta acción borrará todas tus estadísticas.
      <button class="reset-button" onclick="confirmReset()">CONFIRMAR</button>
    </div>
  </div>

  <script>
    // Función para mostrar la advertencia de reinicio de datos
    function resetData() {
      document.getElementById("resetButton").style.display = "none";
      document.getElementById("confirmReset").style.display = "block";
    }

    // Función para confirmar el reinicio de datos
    function confirmReset() {
      // Borrar las estadísticas del localStorage
      localStorage.removeItem("circulowin");
      localStorage.setItem("circulowin", 0); // Reiniciar las estrellas a 0

      // Actualizar el contador en la página
      document.getElementById("victoryCount").innerText = 0;

      // Ocultar el mensaje de confirmación
      document.getElementById("confirmReset").style.display = "none";
      document.getElementById("resetButton").style.display = "block";
    }

    // Colores para el fondo
    const colors = ["#065c05", "#732415", "#a67117", "#191775"];
    let currentColorIndex = 0;

    // Cambiar el fondo cada 5 segundos
    setInterval(() => {
      document.body.style.backgroundColor = colors[currentColorIndex];
      currentColorIndex = (currentColorIndex + 1) % colors.length; // Ciclamos entre los colores
    }, 5000);

    // Obtener las estrellas del localStorage, si no existe se inicializa a 0
    let starCount = parseInt(localStorage.getItem("circulowin")) || 0;

    // Mostrar las estrellas en la página
    document.getElementById("victoryCount").innerText = starCount;
  </script>
</body>
</html>
