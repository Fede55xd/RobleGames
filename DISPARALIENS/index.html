<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <style>
        body {
            background-image: url('src/fondos/inicio.jpg');
            background-size: cover;
            background-position: center center;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
			user-select: none; /* Evita la selección del contenido */
            outline: none;
        }

        h1 {
            font-size: 70px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.7);
            margin-bottom: 40px;
			user-select: none; /* Evita la selección del contenido */
            outline: none;
        }
        
        h2 {
            font-size: 50px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.7);
            margin-bottom: 40px;
            color: yellow;
			user-select: none; /* Evita la selección del contenido */
            outline: none;
        }

        #record {
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            color: skyblue;
			user-select: none; /* Evita la selección del contenido */
            outline: none;
        }

        .image-option {
            width: 200px;
            height: 300px;
            margin: 20px;
            cursor: pointer;
            transition: transform 0.3s ease;
			user-select: none; /* Evita la selección del contenido */
            outline: none;
        }

        .image-option:hover {
            transform: scale(1.1);
			user-select: none; /* Evita la selección del contenido */
            outline: none;
        }

        /* Animación para el fondo */
        @keyframes backgroundAnimation {
            0% {
                background-position: center;
            }
            50% {
                background-position: top right;
            }
            100% {
                background-position: center;
            }
        }

        body {
            animation: backgroundAnimation 10s infinite alternate;
        }

        /* Estilos para el botón de menú */
        #menu-button {
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 30px;
			user-select: none; /* Evita la selección del contenido */
            outline: none;
        }

        #menu-button:hover {
            background-color: #e53935;
			user-select: none; /* Evita la selección del contenido */
            outline: none;
        }
    </style>
</head>
<body>

    <h1>DISPARALIENS</h1>
    <div id="record">Récord de Asesinatos: 0</div>
    <h2>ELIGE UN MAPA</h2>

    <!-- Imágenes que permiten elegir el fondo y redirigir al juego -->
    <div>
        <img src="src/fondos/fondo1.jpg" alt="Fondo 1" class="image-option" id="fondo1">
        <img src="src/fondos/fondo2.jpg" alt="Fondo 2" class="image-option" id="fondo2">
        <img src="src/fondos/fondo3.jpg" alt="Fondo 3" class="image-option" id="fondo3">
        <img src="src/fondos/fondo4.png" alt="Fondo 4" class="image-option" id="fondo4">
    </div>

    <!-- Botón para volver al menú principal -->
    <button id="menu-button">Volver al Menú Principal</button>

    <script>
        // Recuperar el récord de asesinatos desde el localStorage
        let recordAsesinatos = localStorage.getItem('recordAsesinatos') || 0;

        // Actualizar el contenido de los elementos en la página
        document.getElementById('record').textContent = `Récord de Asesinatos: ${recordAsesinatos}`;

        // Acción al hacer clic en la imagen fondo1
        document.getElementById('fondo1').addEventListener('click', function() {
            console.log("Redirigiendo a mapa1...");
            window.location.href = 'mapa1/naves.html'; // Verifica si esta ruta es correcta
        });

        // Acción al hacer clic en la imagen fondo2
        document.getElementById('fondo2').addEventListener('click', function() {
            console.log("Redirigiendo a mapa2...");
            window.location.href = 'mapa2/naves.html'; // Verifica si esta ruta es correcta
        });

        // Acción al hacer clic en la imagen fondo3
        document.getElementById('fondo3').addEventListener('click', function() {
            console.log("Redirigiendo a mapa3...");
            window.location.href = 'mapa3/naves.html'; // Verifica si esta ruta es correcta
        });

        // Acción al hacer clic en la imagen fondo4
        document.getElementById('fondo4').addEventListener('click', function() {
            console.log("Redirigiendo a mapa4...");
            window.location.href = 'mapa4/naves.html'; // Verifica si esta ruta es correcta
        });

        // Acción al hacer clic en el botón "Volver al Menú Principal"
        document.getElementById('menu-button').addEventListener('click', function() {
            window.location.href = '../index.html'; // Redirige al menú principal
        });
    </script>

</body>
</html>
