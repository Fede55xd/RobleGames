<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego de Nave</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
      user-select: none;
      outline: none;
      cursor: none !important;
    }

    #background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-size: cover;
      background-position: center;
      transition: background-image 0.03s ease-in-out; /* Transición suave del fondo */
    }

    canvas {
      display: block;
      user-select: none;
      outline: none;
    }

    .game-over {
      color: white;
      font-size: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      user-select: none;
      outline: none;
    }

    .pause-message {
      color: white;
      font-size: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      user-select: none;
      outline: none;
    }

    .scoreboard {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 24px;
      user-select: none;
      outline: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="background"></div> <!-- Fondo dinámico -->
  <div class="game-over">Juego Terminado</div>
  <div class="pause-message">Pausa</div>

  <div class="scoreboard">
    Puntos: <span id="score">0</span> | Récord: <span id="record">0</span>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    // Inicialización de canvas y contexto
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let lastTime = 0;
    let gamePaused = false;
    let gameOver = false;

    const sonidoMisil = new Audio('src/misil.mp3');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const nave = new Image();
    nave.src = 'src/nave.png';

    const asteroide = new Image();
    asteroide.src = 'src/asteroide1.png';

    const misil = new Image();
    misil.src = 'src/misil.png';

    const naveWidth = 150;
    const naveHeight = 150;
    let naveX = canvas.width / 2 - naveWidth / 2;
    let naveY = canvas.height - naveHeight - 10;

    let derecha = false;
    let izquierda = false;
    let arriba = false;
    let abajo = false;

    const asteroides = [];
    const misiles = [];
    let puntos = 0;
    const fondos = 12; // Número total de fondos
    let fondoActual = 1; // Fondo actual
    let asteroidesEliminados = 0;
    let recordAsteriode = localStorage.getItem("recordAsteriode") || 0;

    // Pre-cargar imágenes de fondo
    let fondosPreCargados = [];
    for (let i = 1; i <= fondos; i++) {
      const img = new Image();
      img.src = `src/fondos/${i}.png`;
      fondosPreCargados.push(img);
    }

    // Mostrar el récord al cargar la página
    document.getElementById("record").textContent = recordAsteriode;

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') derecha = true;
      if (e.key === 'ArrowLeft') izquierda = true;
      if (e.key === 'ArrowUp') arriba = true;
      if (e.key === 'ArrowDown') abajo = true;
      if (e.key === ' ') dispararMisil();
      if (e.key === 'p' || e.key === 'Escape') {
        gamePaused = !gamePaused;
        if (gamePaused) {
          document.querySelector('.pause-message').style.display = 'block';
        } else {
          document.querySelector('.pause-message').style.display = 'none';
          lastTime = 0;
          updateGame();
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowRight') derecha = false;
      if (e.key === 'ArrowLeft') izquierda = false;
      if (e.key === 'ArrowUp') arriba = false;
      if (e.key === 'ArrowDown') abajo = false;
    });

    class Asteroide {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -50;
        this.width = 100;
        this.height = 100;
        this.speed = 2 + Math.random() * 3;
      }

      draw() {
        ctx.drawImage(asteroide, this.x, this.y, this.width, this.height);
      }

      update(deltaTime) {
        this.y += this.speed * (deltaTime / 16);
        if (this.y > canvas.height) {
          this.y = -this.height;
          this.x = Math.random() * canvas.width;
        }
        this.draw();
      }

      checkCollision() {
        const dx = this.x + this.width / 2 - naveX - naveWidth / 2;
        const dy = this.y + this.height / 2 - naveY - naveHeight / 2;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < (this.width / 2 + naveWidth / 2)) {
          gameOver = true;
          setTimeout(() => {
            window.location.href = 'perder.html';
          }, 500);
        }
      }
    }

    class Misil {
      constructor(x, y) {
        this.x = x + naveWidth / 2 - 30;
        this.y = y;
        this.width = 60;
        this.height = 120;
        this.speed = 5;
      }

      draw() {
        ctx.drawImage(misil, this.x, this.y, this.width, this.height);
      }

      update() {
        this.y -= this.speed;
        this.draw();
      }

      checkCollision(asteroides) {
        asteroides.forEach((asteroide, index) => {
          const dx = this.x + this.width / 2 - asteroide.x - asteroide.width / 2;
          const dy = this.y + this.height / 2 - asteroide.y - asteroide.height / 2;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < (this.width / 2 + asteroide.width / 2)) {
            asteroides.splice(index, 1);
            misiles.splice(misiles.indexOf(this), 1);
            puntos += 10;
            document.getElementById("score").textContent = puntos;
            asteroidesEliminados++;

            if (asteroidesEliminados >= 10) {
              // Cambio de fondo aleatorio
              fondoActual = Math.floor(Math.random() * fondos) + 1;
              document.getElementById('background').style.backgroundImage = `url('src/fondos/${fondoActual}.png')`;
              asteroidesEliminados = 0;
            }
          }
        });
      }
    }

    function dispararMisil() {
      if (!gameOver && !gamePaused) {
        sonidoMisil.pause();
        sonidoMisil.currentTime = 0;
        sonidoMisil.play();
        const nuevoMisil = new Misil(naveX, naveY);
        misiles.push(nuevoMisil);
      }
    }

    function spawnAsteroides() {
      if (!gameOver && !gamePaused && Math.random() < 0.02) {
        asteroides.push(new Asteroide());
      }
    }

    function drawNave() {
      ctx.drawImage(nave, naveX, naveY, naveWidth, naveHeight);
    }

    function moveNave() {
      if (derecha && naveX + naveWidth < canvas.width) naveX += 5;
      if (izquierda && naveX > 0) naveX -= 5;
      if (arriba && naveY > 0) naveY -= 5;
      if (abajo && naveY + naveHeight < canvas.height) naveY += 5;
    }

    // Función para asignar fondo aleatorio inicial
    function setRandomBackground() {
      fondoActual = Math.floor(Math.random() * fondos) + 1;
      document.getElementById('background').style.backgroundImage = `url('src/fondos/${fondoActual}.png')`;
    }

    // Llamar para que el fondo aleatorio se asigne desde el principio
    setRandomBackground();

    // Cambiar el fondo aleatorio cada 10 segundos
    setInterval(() => {
      if (asteroidesEliminados >= 10) {
        fondoActual = Math.floor(Math.random() * fondos) + 1;
        document.getElementById('background').style.backgroundImage = `url('src/fondos/${fondoActual}.png')`;
        asteroidesEliminados = 0;
      }
    }, 3000);

    function updateGame(currentTime) {
      if (gameOver) {
        if (puntos > recordAsteriode) {
          recordAsteriode = puntos;
          localStorage.setItem("recordAsteriode", recordAsteriode);
          document.getElementById("record").textContent = recordAsteriode;
        }
        document.querySelector('.game-over').style.display = 'block';
        return;
      }

      const deltaTime = currentTime - lastTime;
      lastTime = currentTime;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      spawnAsteroides();
      asteroides.forEach(asteroide => {
        asteroide.update(deltaTime);
        asteroide.checkCollision();
      });

      misiles.forEach(misil => {
        misil.update();
        misil.checkCollision(asteroides);
      });

      moveNave();
      drawNave();

      if (!gamePaused) {
        requestAnimationFrame(updateGame);
      }
    }

    nave.onload = () => {
      asteroide.onload = () => {
        misil.onload = () => {
          requestAnimationFrame(updateGame);
        };
      };
    };
  </script>
</body>
</html>
