<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de Inicio</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      background-size: cover;
      background-position: center;
      transition: background-image 1s ease-in-out; /* Transición suave del fondo */
    }

    h1 {
      font-size: 50px;
      text-align: center;
    }

    h2 {
      font-size: 30px;
      text-align: center;
    }

    button {
      background-color: #333;
      color: white;
      padding: 20px 40px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin: 10px;
    }

    button:hover {
      background-color: #555;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1; /* Esto asegura que el fondo no tape el contenido */
    }
  </style>
</head>
<body>

  <h1>RobAsteroide</h1>
  <h2>Muevete con las flechas del teclado</h2>
  <h2>Dispara con la tecla espacio</h2>
  <button onclick="window.location.href = 'jugar.html';">Jugar</button>
  <button onclick="window.location.href = '../index.html';">Volver al Menú Principal</button>

  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Función para ajustar el tamaño del canvas al tamaño de la ventana
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    // Llamar a resizeCanvas inicialmente y cada vez que se cambie el tamaño de la ventana
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Ajuste inicial

    // Fondo de imágenes
    const fondos = [];
    for (let i = 1; i <= 12; i++) {
      fondos.push(`src/fondos/${i}.png`);
    }

    // Función para cambiar el fondo de manera aleatoria
    function cambiarFondoAleatorio() {
      const fondoAleatorio = Math.floor(Math.random() * fondos.length); // Selecciona un fondo aleatorio
      document.body.style.backgroundImage = `url('${fondos[fondoAleatorio]}')`;
    }

    // Establecer un fondo aleatorio al inicio
    cambiarFondoAleatorio();

    // Cambiar el fondo aleatoriamente cada 10 segundos
    setInterval(cambiarFondoAleatorio, 10000); // 10000 ms = 10 segundos

  </script>

</body>
</html>
