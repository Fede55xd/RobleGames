<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Perdiste! - BigBet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f8d7da;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 2px solid #f5c6cb;
            border-radius: 10px;
            background-color: white;
        }
        h1 {
            color: #dc3545;
        }
        p {
            color: #721c24;
            font-size: 18px;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        .button-danger {
            background-color: #dc3545;
        }
        .button-danger:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Perdiste!</h1>
        <p>Tu saldo llegó a 0. No te preocupes, puedes volver a intentarlo.</p>
        
        <!-- Botón para reiniciar el juego -->
        <button onclick="reiniciarJuego()">Reiniciar</button>

        <!-- Botón para volver al menú principal -->
        <br>
        <button class="button-danger" onclick="volverMenu()">Volver al Menú Principal</button>
    </div>

    <script>
        // Función para reiniciar el juego
        function reiniciarJuego() {
            localStorage.setItem('bigbetdinero', 100); // Reiniciar el saldo a 100
            window.location.href = "index.html"; // Volver al juego
        }

        // Función para volver al menú principal
        function volverMenu() {
            window.location.href = "../index.html"; // Redirigir al menú principal
        }
    </script>

</body>
</html>
