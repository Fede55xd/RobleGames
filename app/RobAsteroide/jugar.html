<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego de Nave</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }
    canvas {
      display: block;
      background-color: black; /* Fondo negro */
    }
    .game-over {
      color: white;
      font-size: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }
    .scoreboard {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 24px;
    }
    .pause-message {
      color: white;
      font-size: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div class="game-over">¡Perdiste!</div>
  <div class="pause-message">¡Juego Pausado!</div>
  <div class="scoreboard">
    Puntos: <span id="score">0</span> | Récord: <span id="record">0</span>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let lastTime = 0;  // Tiempo anterior para el cálculo de deltaTime
    let gamePaused = false;
    let gameOver = false;

    // Cargar el sonido del misil
    const sonidoMisil = new Audio('src/misil.mp3');  // Asegúrate de que la ruta sea correcta

    // Función para ajustar el tamaño del canvas al tamaño de la ventana
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    // Llamar a resizeCanvas inicialmente y cada vez que se cambie el tamaño de la ventana
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Ajuste inicial

    // Efecto de líneas blancas moviéndose
    const lineas = [];
    function createLines() {
      for (let i = 0; i < 100; i++) {
        lineas.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          velocidad: 2 + Math.random() * 3
        });
      }
    }

    // Actualización de las líneas
    function moveLines() {
      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      lineas.forEach((linea, index) => {
        ctx.beginPath();
        ctx.moveTo(linea.x, linea.y);
        linea.y += linea.velocidad;
        ctx.lineTo(linea.x, linea.y);
        ctx.stroke();

        if (linea.y > canvas.height) {
          linea.y = -10;
        }
      });
    }

    // Función para actualizar el fondo
    function updateBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpiar el canvas
      moveLines();  // Mover las líneas para dar el efecto de movimiento
    }

    // Crear las líneas de movimiento
    createLines();
    updateBackground(); // Iniciar el fondo animado

    // Cargar imágenes
    const nave = new Image();
    nave.src = 'src/nave.png'; // Asegúrate de que la imagen esté en la carpeta src

    const asteroide = new Image();
    asteroide.src = 'src/asteroide1.png'; // Asegúrate de que la imagen esté en la carpeta src

    const misil = new Image();
    misil.src = 'src/misil.png'; // Asegúrate de que la imagen esté en la carpeta src

    const naveWidth = 150;  // La nave ahora es 3 veces más grande
    const naveHeight = 150;  // La nave ahora es 3 veces más grande
    let naveX = canvas.width / 2 - naveWidth / 2;
    let naveY = canvas.height - naveHeight - 10;

    let derecha = false;
    let izquierda = false;
    let arriba = false;
    let abajo = false;

    const asteroides = [];
    const misiles = [];
    let puntos = 0;
    let recordAsteriode = localStorage.getItem("recordAsteriode") || 0; // Obtener el récord guardado

    // Mostrar el récord
    document.getElementById("record").textContent = recordAsteriode;

    // Control de la nave con las flechas
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') derecha = true;
      if (e.key === 'ArrowLeft') izquierda = true;
      if (e.key === 'ArrowUp') arriba = true;
      if (e.key === 'ArrowDown') abajo = true;
      if (e.key === ' ') dispararMisil();  // Tecla espacio para disparar el misil

      // Teclas para pausar el juego
      if (e.key === 'p' || e.key === 'Escape') {
        gamePaused = !gamePaused;  // Alternar el estado de pausa
        if (gamePaused) {
          document.querySelector('.pause-message').style.display = 'block';
        } else {
          document.querySelector('.pause-message').style.display = 'none';
          lastTime = 0;  // Resetear el tiempo al reanudar
          updateGame();  // Reanudar el juego
        }
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowRight') derecha = false;
      if (e.key === 'ArrowLeft') izquierda = false;
      if (e.key === 'ArrowUp') arriba = false;
      if (e.key === 'ArrowDown') abajo = false;
    });

    // Clase para los asteroides que caen
    class Asteroide {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -50;
        this.width = 100;  // El asteroide ahora es el doble de grande
        this.height = 100;  // El asteroide ahora es el doble de grande
        this.speed = 2 + Math.random() * 3;
      }

      draw() {
        ctx.drawImage(asteroide, this.x, this.y, this.width, this.height);
      }

      update(deltaTime) {
        this.y += this.speed * (deltaTime / 16);  // Ajustar velocidad con el deltaTime
        if (this.y > canvas.height) {
          this.y = -this.height;
          this.x = Math.random() * canvas.width;
        }
        this.draw();
      }

      // Comprobar si la nave colisiona con el asteroide
      checkCollision() {
        const dx = this.x + this.width / 2 - naveX - naveWidth / 2;
        const dy = this.y + this.height / 2 - naveY - naveHeight / 2;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < (this.width / 2 + naveWidth / 2)) {
          gameOver = true;
          setTimeout(() => {
            window.location.href = 'perder.html';  // Redirige a la página de perder
          }, 500); 
        }
      }
    }

    // Clase para los misiles disparados
    class Misil {
      constructor(x, y) {
        this.x = x + naveWidth / 2 - 30;  // Ajuste para centrar el misil
        this.y = y;
        this.width = 60;
        this.height = 120;
        this.speed = 5;
      }

      draw() {
        ctx.drawImage(misil, this.x, this.y, this.width, this.height);
      }

      update() {
        this.y -= this.speed;
        this.draw();
      }

      // Comprobar si el misil colide con un asteroide
      checkCollision(asteroides) {
        asteroides.forEach((asteroide, index) => {
          const dx = this.x + this.width / 2 - asteroide.x - asteroide.width / 2;
          const dy = this.y + this.height / 2 - asteroide.y - asteroide.height / 2;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < (this.width / 2 + asteroide.width / 2)) {
            asteroides.splice(index, 1);  // Eliminar asteroide
            misiles.splice(misiles.indexOf(this), 1);  // Eliminar misil
            puntos += 10;  // Aumentar puntos
            document.getElementById("score").textContent = puntos;  // Actualizar puntos en pantalla
          }
        });
      }
    }

    // Función para disparar el misil
    function dispararMisil() {
      if (!gameOver && !gamePaused) {
        // Detener y reiniciar el sonido cada vez que se dispare
        sonidoMisil.pause();
        sonidoMisil.currentTime = 0;  // Reiniciar el sonido
        sonidoMisil.play();  // Reproducir el sonido

        const nuevoMisil = new Misil(naveX, naveY);
        misiles.push(nuevoMisil);
      }
    }

    // Función para generar asteroides
    function spawnAsteroides() {
      if (!gameOver && !gamePaused && Math.random() < 0.02) {
        asteroides.push(new Asteroide());
      }
    }

    // Función para dibujar la nave
    function drawNave() {
      ctx.drawImage(nave, naveX, naveY, naveWidth, naveHeight);
    }

    // Función para mover la nave
    function moveNave() {
      if (derecha && naveX + naveWidth < canvas.width) {
        naveX += 5;
      }
      if (izquierda && naveX > 0) {
        naveX -= 5;
      }
      if (arriba && naveY > 0) {
        naveY -= 5;
      }
      if (abajo && naveY + naveHeight < canvas.height) {
        naveY += 5;
      }
    }

    // Función principal del juego
    function updateGame(currentTime) {
      if (gameOver) {
        if (puntos > recordAsteriode) {
          recordAsteriode = puntos;
          localStorage.setItem("recordAsteriode", recordAsteriode); 
          document.getElementById("record").textContent = recordAsteriode;
        }
        document.querySelector('.game-over').style.display = 'block';
        return;
      }

      // Calcular el deltaTime (tiempo transcurrido entre frames)
      const deltaTime = currentTime - lastTime;
      lastTime = currentTime;

      ctx.clearRect(0, 0, canvas.width, canvas.height); 

      moveLines(); 
      spawnAsteroides();
      asteroides.forEach(asteroide => {
        asteroide.update(deltaTime);  // Actualizar asteroides usando deltaTime
        asteroide.checkCollision();
      });

      misiles.forEach(misil => {
        misil.update(); 
        misil.checkCollision(asteroides);
      });

      moveNave();
      drawNave();

      if (!gamePaused) {
        requestAnimationFrame(updateGame);  // Solo continuar si el juego no está en pausa
      }
    }

    // Esperar que las imágenes se carguen antes de iniciar el juego
    nave.onload = () => {
      asteroide.onload = () => {
        misil.onload = () => {
          requestAnimationFrame(updateGame); // Iniciar el juego cuando todas las imágenes se hayan cargado
        };
      };
    };
  </script>
</body>
</html>
