<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Selección de Juegos</title>
    <style>
        /* Estilo global del body */
        body {
            font-family: Arial, sans-serif;
            background-image: url('fondo.jpg'); /* Ruta de la imagen de fondo */
            background-size: cover;  /* Hace que la imagen cubra toda la pantalla */
            background-position: center;  /* Centra la imagen */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            text-align: center;
            animation: moveBackground 30s linear infinite; /* Animación que mueve el fondo */
        }

        /* Animación para mover la imagen de fondo */
        @keyframes moveBackground {
            0% {
                background-position: center top; /* Empieza en la parte superior */
            }
            50% {
                background-position: center bottom; /* Se mueve hacia la parte inferior */
            }
            100% {
                background-position: center top; /* Vuelve a la parte superior */
            }
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .menu-button {
            background-color: transparent;
            color: white;
            font-size: 1.2rem;
            padding: 15px 30px;
            margin: 10px;
            border: 2px solid rgba(255, 255, 255, 0.6); /* Borde sutil transparente */
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-button:hover {
            background-color: rgba(255, 255, 255, 0.1); /* Fondo ligeramente blanco al pasar el ratón */
            border-color: #4CAF50; /* Cambia el borde a un color verde */
        }

        .menu-button:active {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #45a049;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <h1>Selecciona un Juego</h1>
    <div class="menu-container">
        <button class="menu-button" onclick="window.location.href='disparaliens/index.html'">DISPARALIENS</button>
        <button class="menu-button" onclick="window.location.href='RobAsteroide/index.html'">ROBASTEROIDE</button>
        <button class="menu-button" onclick="window.location.href='BigBet/index.html'">BIGBET</button> 
        <button class="menu-button" onclick="window.location.href='flappy/index.html'">FLAPPY BIRD</button> 
    </div>

</body>
</html>
